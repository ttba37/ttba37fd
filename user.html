<!DOCTYPE html>
<html>
<head>
<title>TTBA37FD - User Panel</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;padding:20px}
input{margin:5px;padding:6px;width:250px}
button{margin:5px;padding:6px 15px}
.section{border:1px solid #ccc;padding:15px;margin-bottom:20px}
</style>
</head>
<body>

<h2>User Dashboard</h2>

<button onclick="logout()">Logout</button>

<div class="section">
<h3>Book Railway Ticket</h3>
<input id="name" placeholder="Name"><br>
<input id="rank" placeholder="Rank"><br>
<input id="from" placeholder="From Station"><br>
<input id="to" placeholder="To Station"><br>
<input id="date" type="date"><br>
<input id="trainno" placeholder="Train No"><br>
<input id="trainname" placeholder="Train Name"><br>
<input id="mobile" placeholder="Mobile"><br>
<input id="email" placeholder="Email"><br>
<button onclick="bookTicket()">Submit Request</button>
</div>

<div class="section">
<h3>My Tickets</h3>
<div id="tickets"></div>
</div>

<div class="section">
<h3>Change Password</h3>
<input type="password" id="newpwd" placeholder="New Password">
<button onclick="changePwd()">Change</button>
</div>

<script>
const supabase = window.supabase.createClient(
"xauglxafzcmrqoncprvq",
"sb_publishable__ERFLSimXSHg7EOdQrestA_7GOpQjpw"
);

let user;

async function init(){
const { data } = await supabase.auth.getUser();
if(!data.user){
window.location="index.html";
}
user = data.user;
loadTickets();
}

async function bookTicket(){
await supabase.from("tickets").insert({
user_id: user.id,
name: name.value,
rank: rank.value,
from_stn: from.value,
to_stn: to.value,
journey_date: date.value,
train_no: trainno.value,
train_name: trainname.value,
mobile: mobile.value,
email: email.value
});
alert("Request Sent");
loadTickets();
}

async function loadTickets(){
const { data } = await supabase
.from("tickets")
.select("*")
.eq("user_id", user.id);

let html="";
data.forEach(t=>{
html+=`
<div style="border:1px solid black;margin:10px;padding:10px">
Status: ${t.status}<br>
Journey: ${t.from_stn} → ${t.to_stn}<br>
Date: ${t.journey_date}<br>
${t.ticket_file ? `<button onclick="downloadTicket('${t.id}','${t.ticket_file}')">Download Ticket</button>`:''}
</div>
`;
});
document.getElementById("tickets").innerHTML=html;
}

async function downloadTicket(id,url){
window.open(url,"_blank");
await supabase
.from("tickets")
.update({status:"Completed"})
.eq("id",id);
alert("Downloaded. Moved to history.");
loadTickets();
}

async function changePwd(){
await supabase.auth.updateUser({
password: newpwd.value
});
alert("Password changed");
}

async function logout(){
await supabase.auth.signOut();
window.location="index.html";
}

init();
</script>

</body>
</html>
