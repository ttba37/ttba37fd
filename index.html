<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TTBA37FD Username Login System</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#0f2027;
  color:white;
  text-align:center;
  padding-top:50px;
}
.box{
  background:#203a43;
  padding:20px;
  margin:20px auto;
  width:300px;
  border-radius:10px;
}
input{
  width:90%;
  padding:8px;
  margin:5px;
  border:none;
  border-radius:5px;
}
button{
  padding:8px 15px;
  border:none;
  background:#00c6ff;
  color:black;
  font-weight:bold;
  cursor:pointer;
  border-radius:5px;
}
</style>
</head>
<body>

<h2>Signup</h2>
<div class="box">
  <input type="text" id="username" placeholder="Username"><br>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="signUp()">Sign Up</button>
</div>

<h2>Login</h2>
<div class="box">
  <input type="text" id="loginUsername" placeholder="Username"><br>
  <input type="password" id="loginPassword" placeholder="Password"><br>
  <button onclick="login()">Login</button>
</div>

<script>
const supabaseUrl = "https://mcgatukwzoliwvxmcszx.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jZ2F0dWt3em9saXd2eG1jc3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNTk1ODMsImV4cCI6MjA4NzczNTU4M30.Vjrx2h4xDW8z0VvnAE6aMOeA46pS9GXBKoDDKJLQQWY";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function signUp() {
  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if(!username || !email || !password){
    alert("Fill all fields");
    return;
  }

  // Create Auth User
  const { data, error } = await supabase.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    alert(error.message);
    return;
  }

  // Insert into users table
  const { error: insertError } = await supabase
    .from("users")
    .insert([
      { username: username, email: email, role: "user" }
    ]);

  if (insertError) {
    alert(insertError.message);
    return;
  }

  alert("Signup successful!");
}

async function login() {
  const username = document.getElementById("loginUsername").value;
  const password = document.getElementById("loginPassword").value;

  if(!username || !password){
    alert("Enter username and password");
    return;
  }

  // Get email from users table
  const { data, error } = await supabase
    .from("users")
    .select("email")
    .eq("username", username)
    .single();

  if (error || !data) {
    alert("Username not found");
    return;
  }

  // Login using email
  const { error: loginError } = await supabase.auth.signInWithPassword({
    email: data.email,
    password: password
  });

  if (loginError) {
    alert("Invalid password");
    return;
  }

  alert("Login successful!");
  // Redirect or show dashboard
  // window.location.href = "dashboard.html";
}
</script>

</body>
</html>
