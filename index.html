<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TTBA37FD Online</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial;background:#1e1e2f;color:white;text-align:center;margin:0;padding:0;}
.card{background:#2c2c3c;padding:20px;margin:20px auto;width:90%;max-width:500px;border-radius:10px;}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:5px;border:none;}
button{background:#4CAF50;color:white;font-weight:bold;cursor:pointer;}
.hidden{display:none;}
#userArea,#adminArea{text-align:left;margin-top:15px;}
.ticket-box{background:#444;padding:10px;margin:5px 0;border-radius:5px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="card" id="loginPage">
<h2>TTBA37FD</h2>
<input type="text" id="loginUser" placeholder="Username">
<input type="password" id="loginPass" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- USER DASHBOARD -->
<div class="card hidden" id="userDashboard">
<h2>User Dashboard</h2>
<button onclick="showBooking()">Book Ticket</button>
<button onclick="loadUserStatus()">Check Status</button>
<button onclick="logout()">Logout</button>
<div id="userArea"></div>
</div>

<!-- ADMIN DASHBOARD -->
<div class="card hidden" id="adminDashboard">
<h2>Admin Dashboard</h2>
<button onclick="showCreateUser()">Create User</button>
<button onclick="loadAllTickets()">View Requests</button>
<button onclick="logout()">Logout</button>
<div id="adminArea"></div>
</div>

<script>
// ====== Supabase Setup ======
const supabase = window.supabase.createClient(
  "https://mcgatukwzoliwvxmcszx.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1jZ2F0dWt3em9saXd2eG1jc3p4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxNTk1ODMsImV4cCI6MjA4NzczNTU4M30.Vjrx2h4xDW8z0VvnAE6aMOeA46pS9GXBKoDDKJLQQWY"
);

let currentUser = "";

// ====== LOGIN ======
async function login(){
  let u=document.getElementById("loginUser").value.trim();
  let p=document.getElementById("loginPass").value.trim();

  if(u==="admin" && p==="admin@1234"){
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("adminDashboard").classList.remove("hidden");
    return;
  }

  const { data } = await supabase
    .from("users")
    .select("*")
    .eq("username", u)
    .eq("password", p)
    .single();

  if(data){
    currentUser=u;
    document.getElementById("loginPage").classList.add("hidden");
    document.getElementById("userDashboard").classList.remove("hidden");
  } else {
    alert("Invalid Login");
  }
}

function logout(){ location.reload(); }

// ====== USER FUNCTIONS ======
function showBooking(){
  document.getElementById("userArea").innerHTML=`
    <input id="from" placeholder="From Station">
    <input id="to" placeholder="To Station">
    <button onclick="sendRequest()">Send Request</button>
  `;
}

async function sendRequest(){
  let from=document.getElementById("from").value;
  let to=document.getElementById("to").value;
  if(!from || !to){ alert("Fill both fields"); return; }

  await supabase.from("tickets").insert([{
    username: currentUser,
    from_station: from,
    to_station: to,
    status: "Pending"
  }]);

  alert("Request Sent");
  showBooking();
}

async function loadUserStatus(){
  const { data } = await supabase
    .from("tickets")
    .select("*")
    .eq("username", currentUser);

  let html="";
  data.forEach(t=>{
    html+=`<div class="ticket-box">${t.from_station} → ${t.to_station} | <b>${t.status}</b></div>`;
  });

  document.getElementById("userArea").innerHTML=html;
}

// ====== ADMIN FUNCTIONS ======
function showCreateUser(){
  document.getElementById("adminArea").innerHTML=`
    <input id="newUser" placeholder="Username">
    <input id="newPass" placeholder="Password">
    <button onclick="createUser()">Create User</button>
  `;
}

async function createUser(){
  let u=document.getElementById("newUser").value.trim();
  let p=document.getElementById("newPass").value.trim();
  if(!u || !p){ alert("Fill both fields"); return; }

  const { error } = await supabase.from("users").insert([{username:u,password:p,role:"user"}]);
  if(error){ alert("Error creating user"); } else { alert("User Created"); }
}

async function loadAllTickets(){
  const { data } = await supabase.from("tickets").select("*");

  let html="";
  data.forEach(t=>{
    html+=`
      <div class="ticket-box">
        <b>${t.username}</b> | ${t.from_station} → ${t.to_station} | ${t.status} 
        ${t.status==="Pending"?`<button onclick="approve('${t.id}')">Approve</button>`:""}
      </div>
    `;
  });

  document.getElementById("adminArea").innerHTML=html;
}

async function approve(id){
  await supabase.from("tickets").update({status:"Approved"}).eq("id",id);
  loadAllTickets();
}
</script>
</body>
</html>
